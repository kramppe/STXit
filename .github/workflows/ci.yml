name: STXit CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]
  schedule:
    # Weekly dependency check (Mondays 9 AM UTC)
    - cron: '0 9 * * 1'

jobs:
  lint-and-test:
    name: Syntax & Import Checks
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyyaml ast flake8 black pytest
    
    - name: Syntax check all Python files
      run: |
        python ci/syntax_check.py
    
    - name: Check required files exist
      run: |
        python ci/file_check.py
    
    - name: Validate environment.yml
      run: |
        python ci/yaml_check.py

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -e .
        pip install pytest pytest-cov
    
    - name: Run unit tests
      run: |
        if [ -d "tests" ] && [ "$(find tests -name '*.py' | wc -l)" -gt 0 ]; then
          echo "Running unit tests..."
          python -m pytest tests/ -v --cov=stxit
        else
          echo "No test files found in tests/ directory"
          echo "Test framework ready for future test development"
        fi

  integration-test:
    name: Integration Test
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Conda
      uses: conda-incubator/setup-miniconda@v2
      with:
        miniforge-version: latest
        environment-file: environment.yml
        activate-environment: stxit
        auto-activate-base: false
    
    - name: Install STXit
      shell: bash -l {0}
      run: |
        pip install -e .
    
    - name: Test CLI help
      shell: bash -l {0}
      run: |
        stxit --help
        stxit --version
    
    - name: Validate STX database
      shell: bash -l {0}
      run: |
        python -c "
        from stxit.stx_db import STXDatabase
        db = STXDatabase()
        issues = db.validate_database()
        if issues:
            print('Database issues:', issues)
            exit(1)
        print('STX database validation passed')
        "

  docker-build:
    name: Docker Build Test
    runs-on: ubuntu-latest
    needs: lint-and-test
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Build Docker image
      run: |
        docker build -t stxit:test .
    
    - name: Test Docker container
      run: |
        docker run --rm stxit:test stxit --version
        docker run --rm stxit:test stxit --help

  dependency-check:
    name: Dependency Version Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests pyyaml conda-package-handling
    
    - name: Check for dependency updates
      run: |
        python ci/dependency_check.py
    
    - name: Create update issue
      if: failure()
      uses: actions/github-script@v6
      with:
        script: |
          const issue = await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: 'Weekly Dependency Update Check',
            body: 'Automated check found potential dependency updates. Please review the CI logs.',
            labels: ['dependencies', 'maintenance']
          });
          console.log('Created issue:', issue.data.number);
